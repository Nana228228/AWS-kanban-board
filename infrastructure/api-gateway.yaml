AWSTemplateFormatVersion: '2010-09-09'
Description: API Gateway configuration for Kanban Board application

Parameters:
  BackendALBDnsName:
    Type: String
    Description: DNS name of the Backend Application Load Balancer
  LambdaFunctionArn:
    Type: String
    Description: ARN of the Lambda function for reports
  StageName:
    Type: String
    Default: prod
    Description: API Gateway stage name

Resources:
  # HTTP API Gateway
  KanbanApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: kanban-board-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        MaxAge: 86400

  # Stage
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref KanbanApi
      StageName: !Ref StageName
      AutoDeploy: true

  # ===== Backend Integration (HTTP_PROXY → ALB) =====
  # Uses catch-all proxy to forward the full path to the ALB
  BackendIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KanbanApi
      IntegrationType: HTTP_PROXY
      IntegrationUri: !Sub 'http://${BackendALBDnsName}/{proxy}'
      IntegrationMethod: ANY
      PayloadFormatVersion: '1.0'

  # ===== Lambda Integration (AWS_PROXY) =====
  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KanbanApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Ref LambdaFunctionArn
      PayloadFormatVersion: '2.0'

  # Lambda Permission for API Gateway invocation
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${KanbanApi}/*'

  # ===== Report Routes → Lambda (defined BEFORE the catch-all) =====

  RouteBoardReport:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KanbanApi
      RouteKey: 'GET /report/board/{id}'
      Target: !Sub 'integrations/${LambdaIntegration}'

  RouteSprintBurndown:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KanbanApi
      RouteKey: 'GET /report/burndown/sprint/{id}'
      Target: !Sub 'integrations/${LambdaIntegration}'

  RouteProjectBurndown:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KanbanApi
      RouteKey: 'GET /report/burndown/project/{id}'
      Target: !Sub 'integrations/${LambdaIntegration}'

  # ===== Catch-all route → Backend (forwards everything else to ALB) =====
  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KanbanApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${BackendIntegration}'

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${KanbanApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  ApiId:
    Description: API Gateway ID
    Value: !Ref KanbanApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'
