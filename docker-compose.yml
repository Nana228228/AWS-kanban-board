version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kanban-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kanban_board
      MYSQL_USER: kanban
      MYSQL_PASSWORD: kanban123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - kanban-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: kanban_board
      DB_USERNAME: kanban
      DB_PASSWORD: kanban123
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kanban-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kanban-network

volumes:
  mysql_data:
    driver: local

networks:
  kanban-network:
    driver: bridge
